<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.022)" stroke-width="0.5"/>
    </pattern>
    <filter id="orchglow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="orchfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(230,57,70,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(230,57,70,0.05)"/>
    </linearGradient>
    <linearGradient id="agentfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.07)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#0b0b12"/>
  <rect width="900" height="500" fill="url(#grid)"/>

  <!-- Orchestrator box -->
  <rect x="70" y="32" width="760" height="152" rx="6" fill="url(#orchfill)" stroke="#e63946" stroke-width="1.5"/>
  <rect x="70" y="32" width="760" height="152" rx="6" fill="none" stroke="#e63946" stroke-width="10" opacity="0.04"/>

  <!-- Orchestrator label -->
  <text x="450" y="62" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="10" font-weight="400" fill="rgba(230,57,70,0.75)" text-anchor="middle" letter-spacing="3.5">EXTERNAL ORCHESTRATOR</text>
  <text x="450" y="88" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="19" font-weight="300" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Clawable / OpenClaw</text>

  <!-- Divider line -->
  <line x1="100" y1="100" x2="800" y2="100" stroke="rgba(230,57,70,0.15)" stroke-width="0.5"/>

  <!-- Cross-system view bullets -->
  <text x="190" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.38)" text-anchor="middle">customer health</text>
  <text x="370" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.38)" text-anchor="middle">payment status</text>
  <text x="543" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.38)" text-anchor="middle">support load</text>
  <text x="716" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.38)" text-anchor="middle">renewal timing</text>
  <circle cx="156" cy="118" r="2" fill="rgba(230,57,70,0.5)"/>
  <circle cx="336" cy="118" r="2" fill="rgba(230,57,70,0.5)"/>
  <circle cx="510" cy="118" r="2" fill="rgba(230,57,70,0.5)"/>
  <circle cx="683" cy="118" r="2" fill="rgba(230,57,70,0.5)"/>

  <!-- BREADTH badge -->
  <rect x="83" y="152" width="76" height="20" rx="3" fill="rgba(230,57,70,0.18)" stroke="rgba(230,57,70,0.45)" stroke-width="0.75"/>
  <text x="121" y="166" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#e63946" text-anchor="middle" letter-spacing="2.5">BREADTH</text>

  <!-- Connector: vertical stem -->
  <line x1="450" y1="184" x2="450" y2="230" stroke="rgba(230,57,70,0.35)" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Horizontal bus -->
  <line x1="193" y1="230" x2="707" y2="230" stroke="rgba(230,57,70,0.28)" stroke-width="1.5"/>

  <!-- Vertical drops to agents -->
  <line x1="193" y1="230" x2="193" y2="274" stroke="rgba(230,57,70,0.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="450" y1="230" x2="450" y2="274" stroke="rgba(230,57,70,0.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="707" y1="230" x2="707" y2="274" stroke="rgba(230,57,70,0.35)" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Arrow heads -->
  <polygon points="193,274 189,264 197,264" fill="rgba(230,57,70,0.55)"/>
  <polygon points="450,274 446,264 454,264" fill="rgba(230,57,70,0.55)"/>
  <polygon points="707,274 703,264 711,264" fill="rgba(230,57,70,0.55)"/>

  <!-- MCP pill -->
  <rect x="404" y="219" width="92" height="20" rx="10" fill="#0b0b12" stroke="rgba(230,57,70,0.3)" stroke-width="0.75"/>
  <text x="450" y="233" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(230,57,70,0.8)" text-anchor="middle" letter-spacing="2">MCP · A2A</text>

  <!-- Agent 1: Einstein / CRM -->
  <rect x="83" y="276" width="220" height="140" rx="6" fill="url(#agentfill)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <text x="193" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle" letter-spacing="3">NATIVE AGENT</text>
  <text x="193" y="328" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="300" fill="rgba(255,255,255,0.88)" text-anchor="middle">Einstein</text>
  <text x="193" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.38)" text-anchor="middle">Salesforce CRM</text>
  <rect x="152" y="392" width="82" height="18" rx="3" fill="rgba(244,162,97,0.12)" stroke="rgba(244,162,97,0.38)" stroke-width="0.75"/>
  <text x="193" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#f4a261" text-anchor="middle" letter-spacing="2.5">DEPTH</text>

  <!-- Agent 2: Joule / ERP -->
  <rect x="340" y="276" width="220" height="140" rx="6" fill="url(#agentfill)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <text x="450" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle" letter-spacing="3">NATIVE AGENT</text>
  <text x="450" y="328" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="300" fill="rgba(255,255,255,0.88)" text-anchor="middle">Joule</text>
  <text x="450" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.38)" text-anchor="middle">SAP ERP</text>
  <rect x="409" y="392" width="82" height="18" rx="3" fill="rgba(244,162,97,0.12)" stroke="rgba(244,162,97,0.38)" stroke-width="0.75"/>
  <text x="450" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#f4a261" text-anchor="middle" letter-spacing="2.5">DEPTH</text>

  <!-- Agent 3: Now Assist / Service -->
  <rect x="597" y="276" width="220" height="140" rx="6" fill="url(#agentfill)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <text x="707" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle" letter-spacing="3">NATIVE AGENT</text>
  <text x="707" y="328" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="300" fill="rgba(255,255,255,0.88)" text-anchor="middle">Now Assist</text>
  <text x="707" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.38)" text-anchor="middle">ServiceNow</text>
  <rect x="666" y="392" width="82" height="18" rx="3" fill="rgba(244,162,97,0.12)" stroke="rgba(244,162,97,0.38)" stroke-width="0.75"/>
  <text x="707" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#f4a261" text-anchor="middle" letter-spacing="2.5">DEPTH</text>

  <!-- Caption -->
  <text x="450" y="462" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="middle">Native agents handle domain execution. The external orchestrator holds the cross-system view. MCP makes delegation possible.</text>

  <!-- Corner marks -->
  <path d="M 18 18 L 18 32 M 18 18 L 32 18" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
  <path d="M 882 18 L 882 32 M 882 18 L 868 18" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
  <path d="M 18 482 L 18 468 M 18 482 L 32 482" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
  <path d="M 882 482 L 882 468 M 882 482 L 868 482" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
</svg>
