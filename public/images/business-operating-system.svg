<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" width="900" height="430">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.022)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="humanfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.07)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>
    <linearGradient id="agentfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(230,57,70,0.14)"/>
      <stop offset="100%" style="stop-color:rgba(230,57,70,0.06)"/>
    </linearGradient>
    <linearGradient id="saasfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.05)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="agentglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(230,57,70,0)"/>
      <stop offset="30%" style="stop-color:rgba(230,57,70,0.35)"/>
      <stop offset="70%" style="stop-color:rgba(230,57,70,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(230,57,70,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="430" fill="#0b0b12"/>
  <rect width="900" height="430" fill="url(#grid)"/>

  <!-- ── LAYER 1: HUMAN ── -->
  <rect x="50" y="28" width="800" height="106" rx="6" fill="url(#humanfill)" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
  <text x="80" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="400" fill="rgba(255,255,255,0.35)" letter-spacing="3.5">HUMAN LAYER</text>
  <text x="80" y="82" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="300" fill="rgba(255,255,255,0.90)">Direction &amp; Oversight</text>
  <text x="80" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Strategy · Approval · Relationships · Creative &amp; ethical judgment</text>
  <!-- Human role chips -->
  <rect x="590" y="48" width="70" height="20" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="0.75"/>
  <text x="625" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.55)" text-anchor="middle">Approve</text>
  <rect x="672" y="48" width="60" height="20" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="0.75"/>
  <text x="702" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.55)" text-anchor="middle">Direct</text>
  <rect x="744" y="48" width="76" height="20" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="0.75"/>
  <text x="782" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.55)" text-anchor="middle">Review</text>

  <!-- Bidirectional arrows: Human ↕ Agent -->
  <!-- Down arrow (findings surfaced to human) -->
  <line x1="450" y1="134" x2="450" y2="159" stroke="rgba(230,57,70,0.5)" stroke-width="1.5"/>
  <polygon points="450,134 445,144 455,144" fill="rgba(230,57,70,0.6)"/>
  <!-- Up arrow (decisions handed down) -->
  <line x1="430" y1="134" x2="430" y2="159" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <polygon points="430,159 425,149 435,149" fill="rgba(255,255,255,0.3)"/>
  <!-- Labels -->
  <text x="464" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(230,57,70,0.7)">findings</text>
  <text x="392" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">direction</text>

  <!-- ── LAYER 2: AGENT ── -->
  <rect x="50" y="162" width="800" height="110" rx="6" fill="url(#agentfill)" stroke="#e63946" stroke-width="1.5"/>
  <!-- Accent glow line at top of agent layer -->
  <rect x="50" y="162" width="800" height="2" rx="1" fill="url(#agentglow)"/>

  <text x="80" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="400" fill="rgba(230,57,70,0.75)" letter-spacing="3.5">AUTONOMOUS AGENT LAYER</text>
  <text x="80" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="300" fill="#ffffff">Business Operating System</text>
  <text x="80" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Continuous · Cross-system · Pattern-aware · 24 / 7</text>

  <!-- Heartbeat pulse dots -->
  <circle cx="626" cy="207" r="3.5" fill="#e63946" opacity="0.8"/>
  <circle cx="626" cy="207" r="7" fill="none" stroke="#e63946" stroke-width="0.75" opacity="0.35"/>
  <circle cx="626" cy="207" r="12" fill="none" stroke="#e63946" stroke-width="0.5" opacity="0.15"/>
  <text x="645" y="211" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(230,57,70,0.65)">heartbeat active</text>

  <!-- Bidirectional arrows: Agent ↕ SaaS -->
  <line x1="450" y1="272" x2="450" y2="295" stroke="rgba(230,57,70,0.45)" stroke-width="1.5"/>
  <polygon points="450,295 445,285 455,285" fill="rgba(230,57,70,0.55)"/>
  <line x1="430" y1="272" x2="430" y2="295" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <polygon points="430,272 425,282 435,282" fill="rgba(255,255,255,0.28)"/>
  <text x="464" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(230,57,70,0.6)">MCP reads</text>
  <text x="384" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.28)">MCP writes</text>

  <!-- ── LAYER 3: SAAS ── -->
  <rect x="50" y="298" width="800" height="100" rx="6" fill="url(#saasfill)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <text x="80" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="400" fill="rgba(255,255,255,0.28)" letter-spacing="3.5">YOUR SAAS STACK</text>

  <!-- Platform boxes -->
  <!-- CRM -->
  <rect x="80" y="332" width="98" height="50" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>
  <text x="129" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="300" fill="rgba(255,255,255,0.65)" text-anchor="middle">CRM</text>
  <text x="129" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">Salesforce</text>

  <!-- ERP -->
  <rect x="192" y="332" width="98" height="50" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>
  <text x="241" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="300" fill="rgba(255,255,255,0.65)" text-anchor="middle">ERP</text>
  <text x="241" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">SAP / Odoo</text>

  <!-- Finance -->
  <rect x="304" y="332" width="98" height="50" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>
  <text x="353" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="300" fill="rgba(255,255,255,0.65)" text-anchor="middle">Finance</text>
  <text x="353" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">Fortnox</text>

  <!-- HR -->
  <rect x="416" y="332" width="98" height="50" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>
  <text x="465" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="300" fill="rgba(255,255,255,0.65)" text-anchor="middle">HR</text>
  <text x="465" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">Workday</text>

  <!-- Content -->
  <rect x="528" y="332" width="98" height="50" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>
  <text x="577" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="300" fill="rgba(255,255,255,0.65)" text-anchor="middle">Content</text>
  <text x="577" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">CMS</text>

  <!-- Support -->
  <rect x="640" y="332" width="98" height="50" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>
  <text x="689" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="300" fill="rgba(255,255,255,0.65)" text-anchor="middle">Support</text>
  <text x="689" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">ServiceNow</text>

  <!-- More indicator -->
  <text x="762" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,0.18)" text-anchor="middle">···</text>

  <!-- Caption -->
  <text x="450" y="416" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.22)" text-anchor="middle">The software stops waiting. The agents run the floor. Humans direct, approve, and decide.</text>

  <!-- Corner marks -->
  <path d="M 18 18 L 18 32 M 18 18 L 32 18" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none"/>
  <path d="M 882 18 L 882 32 M 882 18 L 868 18" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none"/>
  <path d="M 18 412 L 18 398 M 18 412 L 32 412" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none"/>
  <path d="M 882 412 L 882 398 M 882 412 L 868 412" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none"/>
</svg>
